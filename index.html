<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ELGi Fault Report</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.header-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
}

h2 {
    flex: 1;
    text-align: center;
    margin: 0;
}

.header-info {
    text-align: right;
    border: 1px solid #ccc;
    padding: 10px 15px;
    background-color: #f9f9f9;
    border-radius: 4px;
    min-width: 180px;
    flex-shrink: 0;
}

.header-info div {
    margin: 5px 0;
    font-size: 14px;
}

.header-label {
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: center;
}

th {
    background-color: #f2f2f2;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header-container">
    <h2>ELGi Fault History</h2>
    <div class="header-info" id="headerInfo"></div>
</div>

<table id="faultTable">
    <thead>
        <tr>
            <th>S.No</th>
            <th>Fault Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Pressure</th>
            <th>Airend Outlet Temp</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<br>

<button onclick="downloadCSV()">
    Download CSV
</button>

<script>

/* -------------------- Fault Mapping -------------------- */
/*
 * Index 0 is unused (empty). Fault codes from the controller are 1-based:
 *   Faults  : 1–32  (MENU_FAULT_REG_COUNT enum)
 *   Warnings: 33–64 (warn_is + 33)
 */
const SAC_FAULT_BITS_N4 = [
    "",                                       //  0 - unused (codes start at 1)

    /* ---- Faults (1–32) ---- */
    "Emergency Stop",                         //  1: FT_EMERGENCY_STOP
    "Discharge Pressure Probe Failure",       //  2: FT_PROBE_FAIL
    "Discharge Temperature High",             //  3: FT_DISCHARGE_TR_HIGH
    "Discharge Temperature Probe Failure",    //  4: FT_TR_PROBE_FAIL
    "HSP (AS)",                               //  5: FT_SUMP_PR_HIGH
    "Sump Pressure Probe Failure",            //  6: FT_SUMP_PR_PROBE_FAIL
    "Low Voltage",                            //  7: FT_VOLT
    "Main Motor Overload",                    //  8: FT_MAIN_MOTOR_OVERLOAD
    "Cooler Motor Overload",                  //  9: FT_COOLER_MOTOR_OVERLOAD
    "HSP (AD)",                               // 10: FT_DICHARGE_PR_HIGH
    "Reverse Rotation / Phase Fail",          // 11: FT_MOTOR_REVERSE_ROTATION
    "Dis.Pr Not Developing",                  // 12: FT_DISCHARGE_PR_NOT_DEVELOPING
    "Sump Pr Not Developing",                 // 13: FT_SUMP_PR_NOT_DEVELOPING
    "Power Interruption",                     // 14: FT_POWER_FAILURE
    "Dryer Trip",                             // 15: FT_DRYER_TRIP
    "Phase Loss / Reverse",                   // 16: FT_PHASE_LOSS_REV
    "Winding Temperature High",               // 17: FT_WINDING_TR_HIGH
    "Winding Probe Failure",                  // 18: FT_WINDING_TR_PROBE_FAIL
    "Low Dew Point Trip",                     // 19: FT_LOW_DEW_POINT_TRIP
    "Ambient Temp Probe Failure",             // 20: FT_AMBIENT_TR_PROBE_FAIL
    "Ambient Temperature High",               // 21: FT_AMBIENT_TR_HIGH
    "IO Module Disconnected",                 // 22: FT_IO_MODULE_DISCONNECTED
    "ETV PDP Trip",                           // 23: FT_ETV_PDP_FAILURE_TRIP
    "Stage 1 Temp Probe Failure",             // 24: FT_STAGE_1_TR_PROBE_FAILURE
    "Stage 1 Temperature High",               // 25: FT_STAGE_1_TR_HIGH
    "HRS Pressure Probe Failure",             // 26: FT_HRS_WATER_PR_PROBE_FAIL
    "HRS Water Pressure High",                // 27: FT_HRS_WATER_PR_HIGH
    "HRS Water Pressure Low",                 // 28: FT_HRS_WATER_PR_LOW
    "Oil Pressure High",                      // 29: FT_OIL_PR_HIGH
    "HRS Oil Temp Probe Failure",             // 30: FT_HRS_OIL_TEMP_PROBE_FAIL
    "Check Ball Valve Position",              // 31: FT_CHECK_BALL_VALVE_POSITION
    "ETV Feedback Trip",                      // 32: FT_ETV_FEEDBACK_TRIP

    /* ---- Warnings (33–64, stored as warn_is + 33) ---- */
    "W: Change Valve Kit",                    // 33: warn_is=0
    "W: Dryer Probe Failure",                 // 34: warn_is=1
    "W: Dryer off-LowDP Warn",                // 35: warn_is=2
    "W: High Dew Point",                      // 36: warn_is=3
    "W: High Diff. Pressure",                 // 37: warn_is=4
    "W: Change Air Filter",                   // 38: warn_is=5
    "W: Change Oil Filter",                   // 39: warn_is=6
    "W: Change Oil Separator",                // 40: warn_is=7
    "W: Change Oil",                          // 41: warn_is=8
    "W: Change Grease",                       // 42: warn_is=9
    "W: Exceeded Start/Stop Hrs",             // 43: warn_is=10
    "W: Differential Pressure Air Filter",    // 44: warn_is=11
    "W: Differential Pressure Oil Filter",    // 45: warn_is=12
    "W: Warn Temperature",                    // 46: warn_is=13
    "W: Dryer off - IP Warn",                 // 47: warn_is=14
    "W: Calibration Error",                   // 48: warn_is=15
    "W: EEPROM Error",                        // 49: warn_is=16
    "W: Change Pre Filter",                   // 50: warn_is=17
    "W: Change MPV Kit",                      // 51: warn_is=18
    "W: Change BDV Kit",                      // 52: warn_is=19
    "W: Change Solenoid Kit",                 // 53: warn_is=20
    "W: Change ADV Kit",                      // 54: warn_is=21
    "W: Change PF/FF",                        // 55: warn_is=22
    "W: Change CF",                           // 56: warn_is=23
    "W: Severe High Load",                    // 57: warn_is=24
    "W: Warranty Expired",                    // 58: warn_is=25
    "W: Change SPM",                          // 59: warn_is=26
    "W: Very High Load Count",                // 60: warn_is=27
    "W: ETV Feedback Warn",                   // 61: warn_is=28
    "W: HRS Pressure Low Warn",               // 62: warn_is=29
    "W: High Oil Temperature",                // 63: warn_is=30
    "W: High Load Count"                      // 64: warn_is=31
];

/* Compressor status codes (READY=0 … WARNING=12) */
const Compressor_Status_List = [
    "READY",            //  0
    "STAR",             //  1
    "RUN",              //  2
    "RUN_LOAD",         //  3
    "RUN_UNLOAD",       //  4
    "STOP_BUSY",        //  5
    "IDLE",             //  6
    "START_INHIBIT",    //  7
    "TR_INHIBIT",       //  8
    "START_ACK_WAIT",   //  9
    "STANDBY",          // 10
    "FAULT",            // 11
    "WARNING"           // 12
];

/* -------------------- Parse URL -------------------- */

const params = new URLSearchParams(window.location.search);
const faultData = params.get("f");
const fabNumber = params.get("fab") || "Unknown";
const modelNumber = params.get("model") || "Unknown";
const pressureUnit = params.get("pu") || "B";  /* B=bar, P=PSI (default bar) */
const tempUnit = params.get("tu") || "C";      /* C=Celsius, H=Fahrenheit (default Celsius) */

let csvRows = [];
let csvFilename = "ELGi_Fault_Report.csv";

/* Display fab and model in header */
const headerInfo = document.getElementById("headerInfo");
if(headerInfo)
{
    headerInfo.innerHTML =
        `<div><span class="header-label">Fab Number:</span> ${fabNumber}</div>
         <div><span class="header-label">Model:</span> ${modelNumber}</div>`;

    /* Set CSV filename with fab number */
    csvFilename = fabNumber + "_Fault_Report.csv";
}

if(faultData)
{
    const records = faultData.split("|");

    const tbody = document.querySelector("#faultTable tbody");

    let displayIndex = 0;

    records.forEach((record) =>
    {
        const fields = record.split(",");

        if(fields.length < 6)
            return;

        const errorCode  = parseInt(fields[0]);
        const statusCode = parseInt(fields[1]);

        /* Decompress date: YYMMDD → DD/MM/YYYY format. */
        const dateCompressed = fields[2];
        const dateYY = dateCompressed.substring(0, 2);
        const dateMM = dateCompressed.substring(2, 4);
        const dateDD = dateCompressed.substring(4, 6);
        const date = `${dateDD}/${dateMM}/20${dateYY}`;

        /* Decompress time: HHMM → HH:MM format. */
        const timeCompressed = fields[3];
        const timeHH = timeCompressed.substring(0, 2);
        const timeMM = timeCompressed.substring(2, 4);
        const time = `${timeHH}:${timeMM}`;

        /* errorCode is 1-based; SAC_FAULT_BITS_N4[0] is intentionally empty. */
        const rawFaultName = SAC_FAULT_BITS_N4[errorCode] || "";

        /* Mirror fault_report_row_create() condition:
         * skip row if fault string is empty or starts with '0' (invalid entry). */
        if(errorCode === 0 || rawFaultName === "")
            return;

        /* Truncate fault name to 40 characters (matches fault[40] = '\0'). */
        const faultName = rawFaultName.substring(0, 40);

        /* Decompress pressure: unit is in URL parameter (pu=B for bar, pu=P for PSI).
         * "F" = probe failure (display "---")
         * Otherwise, use value + unit from URL param */
        let pressure;
        if(fields[4] === "F")
        {
            pressure = "---";
        }
        else if(pressureUnit === "P")
        {
            pressure = fields[4] + " PSI";
        }
        else
        {
            pressure = fields[4] + " bar";  /* default to bar */
        }

        /* Decompress temperature: unit is in URL parameter (tu=C for Celsius, tu=H for Fahrenheit).
         * "F" = probe failure (display "---")
         * Otherwise, use value + unit from URL param */
        let temp;
        if(fields[5] === "F")
        {
            temp = "---";
        }
        else if(tempUnit === "H")
        {
            temp = fields[5] + "°F";
        }
        else
        {
            temp = fields[5] + "°C";  /* default to Celsius */
        }

        const statusName =
            Compressor_Status_List[statusCode] || ("Status " + statusCode);

        displayIndex++;

        const row = document.createElement("tr");

        row.innerHTML =
            `<td>${displayIndex}</td>
             <td>${faultName}</td>
             <td>${date}</td>
             <td>${time}</td>
             <td>${pressure}</td>
             <td>${temp}</td>
             <td>${statusName}</td>`;

        tbody.appendChild(row);

        csvRows.push([
            displayIndex,
            faultName,
            date,
            time,
            pressure,
            temp,
            statusName
        ]);
    });
}

/* -------------------- CSV Download -------------------- */

function downloadCSV()
{
    let csv =
"S.No,Fault Name,Date,Time,Pressure,Airend Outlet Temp,Status\n";

    csvRows.forEach(row =>
    {
        csv += row.join(",") + "\n";
    });

    const blob = new Blob(
        [csv],
        {type: "text/csv;charset=utf-8;"}
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = csvFilename;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);
}

</script>

</body>
</html>
