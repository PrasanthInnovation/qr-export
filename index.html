<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ELGi Compressor Details</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 30px;
}

table {
    border-collapse: collapse;
    width: 800px;
    max-width: 100%;
}

th, td {
    border: 1px solid #000;
    padding: 10px;
    text-align: left;
}

th {
    background-color: #f0f0f0;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>ELGi Compressor Details</h2>

<table>
<tr><th>Field</th><th>Value</th></tr>
<tr><td>Model</td><td id="model"></td></tr>
<tr><td>Fab Number</td><td id="fab"></td></tr>
<tr><td>Dealer Name</td><td id="dealer"></td></tr>
<tr><td>Dealer Number</td><td id="phone"></td></tr>
<tr><td>Dealer Mail</td><td id="mail"></td></tr>
</table>

<button onclick="downloadCSV()">Download CSV</button>

<script>

const params = new URLSearchParams(window.location.search);

const model  = params.get("model")  || "";
const fab    = params.get("fab")    || "";
const dealer = params.get("dealer") || "";
const phone  = params.get("phone")  || "";
const mail   = params.get("mail")   || "";

document.getElementById("model").innerText  = model;
document.getElementById("fab").innerText    = fab;
document.getElementById("dealer").innerText = dealer;
document.getElementById("phone").innerText  = phone;
document.getElementById("mail").innerText   = mail;

function downloadCSV()
{
    const csv =
`Model,Fab Number,Dealer Name,Dealer Number,Dealer Mail
${model},${fab},${dealer},${phone},${mail}`;

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "compressor_details.csv";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

</script>

</body>
</html>
